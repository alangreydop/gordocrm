version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: gordo_ai_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gordo_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Celery
  redis:
    image: redis:7-alpine
    container_name: gordo_ai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gordo_ai_backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gordo_ai
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LUMA_API_KEY: ${LUMA_API_KEY}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    volumes:
      - ./backend:/app
      - pipeline_storage:/app/pipelines
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gordo_ai_celery
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gordo_ai
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LUMA_API_KEY: ${LUMA_API_KEY}
    volumes:
      - ./backend:/app
      - pipeline_storage:/app/pipelines
    depends_on:
      - backend
      - redis
    command: celery -A app.services.celery_app worker --loglevel=info --pool=solo

  # Celery Beat (scheduled tasks)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gordo_ai_beat
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gordo_ai
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A app.services.celery_app beat --loglevel=info

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gordo_ai_frontend
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
  pipeline_storage:
